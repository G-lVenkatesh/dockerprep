<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bus Ticket Booking</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f4f4f4;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    width:900px;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}

h1{
    text-align:center;
    margin-bottom:20px;
    color:#333;
}

.form{
    display:flex;
    gap:15px;
    margin-bottom:20px;
}

.form select{
    flex:1;
    padding:10px;
    border:1px solid #ccc;
    border-radius:5px;
}

.bus-layout{
    display:flex;
    flex-direction:column;
    align-items:center;
}

.driver{
    width:100%;
    text-align:right;
    margin-bottom:15px;
    font-size:20px;
}

.row{
    display:flex;
    margin-bottom:10px;
}

.seat{
    width:35px;
    height:35px;
    background:#ccc;
    margin:5px;
    border-radius:5px;
    cursor:pointer;
}

.seat.selected{
    background:#28a745;
}

.seat.booked{
    background:#ff4d4d;
    cursor:not-allowed;
}

.aisle{
    width:40px;
}

.summary{
    margin-top:20px;
    text-align:center;
}

.summary p{
    margin:10px 0;
    font-size:18px;
}

button{
    padding:10px 20px;
    background:#007bff;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#0056b3;
}
</style>
</head>

<body>

<div class="container">

    <h1>🚌 Bus Ticket Booking</h1>

    <div class="form">
        <select>
            <option>Bangalore</option>
            <option>Hyderabad</option>
            <option>Chennai</option>
            <option>Mumbai</option>
        </select>

        <select>
            <option>Hyderabad</option>
            <option>Bangalore</option>
            <option>Chennai</option>
            <option>Mumbai</option>
        </select>

        <select id="fare">
            <option value="500">AC Sleeper - ₹500</option>
            <option value="700">Volvo AC - ₹700</option>
            <option value="900">Luxury Sleeper - ₹900</option>
        </select>
    </div>

    <div class="bus-layout">

        <div class="driver">🛞 Driver</div>

        <div class="row">
            <div class="seat"></div>
            <div class="seat"></div>
            <div class="aisle"></div>
            <div class="seat booked"></div>
            <div class="seat"></div>
        </div>

        <div class="row">
            <div class="seat"></div>
            <div class="seat booked"></div>
            <div class="aisle"></div>
            <div class="seat"></div>
            <div class="seat"></div>
        </div>

        <div class="row">
            <div class="seat"></div>
            <div class="seat"></div>
            <div class="aisle"></div>
            <div class="seat"></div>
            <div class="seat booked"></div>
        </div>

        <div class="row">
            <div class="seat"></div>
            <div class="seat"></div>
            <div class="aisle"></div>
            <div class="seat"></div>
            <div class="seat"></div>
        </div>

        <div class="row">
            <div class="seat booked"></div>
            <div class="seat"></div>
            <div class="aisle"></div>
            <div class="seat"></div>
            <div class="seat"></div>
        </div>

    </div>

    <div class="summary">
        <p>Selected Seats: <span id="count">0</span></p>
        <p>Total Fare: ₹<span id="total">0</span></p>
        <button onclick="bookTicket()">Book Ticket</button>
    </div>

</div>

<script>

const seats = document.querySelectorAll('.seat:not(.booked)');
const count = document.getElementById('count');
const total = document.getElementById('total');
const fare = document.getElementById('fare');

let ticketPrice = parseInt(fare.value);

function updateTotal() {
    const selectedSeats =
        document.querySelectorAll('.seat.selected');

    count.innerText = selectedSeats.length;
    total.innerText =
        selectedSeats.length * ticketPrice;
}

seats.forEach(seat => {
    seat.addEventListener('click', () => {
        seat.classList.toggle('selected');
        updateTotal();
    });
});

fare.addEventListener('change', () => {
    ticketPrice = parseInt(fare.value);
    updateTotal();
});

function bookTicket() {

    let selected =
        document.querySelectorAll('.seat.selected');

    if(selected.length === 0){
        alert("Please select at least one seat");
        return;
    }

    alert(
        `Booking Successful!\nSeats: ${selected.length}\nAmount: ₹${total.innerText}`
    );
}

</script>

</body>
</html>
